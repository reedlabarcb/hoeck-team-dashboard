[build]
builder = "nixpacks"

[deploy]
# Migration + idempotent seed run on every deploy from inside Railway's network,
# where postgres.railway.internal resolves. This sidesteps corp firewall blocks on
# the public TCP proxy port (see docs/LESSONS_LEARNED.md "CBRE corp network").
# Seed is idempotent (ON CONFLICT DO NOTHING) — inbound-tracker 0fdcb2f lesson.
# Start command is a dispatcher branching on $SERVICE_ROLE so one repo backs the web service
# AND the cron services. Unset/"web" (the web service sets no SERVICE_ROLE) reproduces the
# historical web command EXACTLY: `npm run db:migrate && npm run seed:users && npm start`.
# Cron services set SERVICE_ROLE=realnex|box-incremental|box-full. See scripts/start-dispatch.sh
# + docs/LESSONS_LEARNED.md "Railway cron".
startCommand = "sh scripts/start-dispatch.sh"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"

# ---------------- Cron jobs — NOT configured here (by design) ----------------
# Railway does NOT support [[deploy.cronJobs]] arrays — only a SINGLE `deploy.cronSchedule`
# per service, which runs that service's start command on the schedule. The array form that
# used to live here was silently ignored by Railway (no error, it simply never ran), so for
# weeks NONE of the box/realnex crons fired and the Box index went stale unnoticed.
# Full write-up: docs/LESSONS_LEARNED.md "Railway cron".
#
# Crons now run as SEPARATE Railway services (one per job), each deploying from THIS repo
# with its own start command + cronSchedule. Setup checklist: docs/RAILWAY_CRON_SETUP.md.
#   - cron-realnex          npm run sync:realnex          0 11 * * *   (3 AM PT / 11:00 UTC)
#   - cron-box-incremental  npm run sync:box:incremental  0 12 * * *   (4 AM PT / 12:00 UTC)
#   - cron-box-full         npm run sync:box:full         0 13 * * 0   (5 AM PT Sun / 13:00 UTC)
# Future crons (also separate services when built, both deferred):
#   - weekly pg_dump -> Box backup (P2.9)      npm run backup:weekly
#   - daily PDF text-extraction (P2.5a)        npm run sync:box:extract-text
#
# This root railway.toml therefore configures ONLY the web service.
