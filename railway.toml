[build]
builder = "nixpacks"

[deploy]
# Migration + idempotent seed run on every deploy from inside Railway's network,
# where postgres.railway.internal resolves. This sidesteps corp firewall blocks on
# the public TCP proxy port (see docs/LESSONS_LEARNED.md "CBRE corp network").
# Seed is idempotent (ON CONFLICT DO NOTHING) — inbound-tracker 0fdcb2f lesson.
startCommand = "npm run db:migrate && npm run seed:users && npm start"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"

# Daily sync at 4 AM Pacific (12:00 UTC) — wired in Phase 3 (RealNex) and Phase 2 (Box).
# Phase 1 stub: sync:all is a no-op.
[[deploy.cronJobs]]
schedule = "0 12 * * *"
command = "npm run sync:all"

# Weekly Postgres backup → Box, 5 AM Pacific Sunday (13:00 UTC).
# COMMENTED OUT until Phase 2 wires Box upload. Don't fire crons into the void.
