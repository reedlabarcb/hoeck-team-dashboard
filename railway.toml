[build]
builder = "nixpacks"

[deploy]
# Migration + idempotent seed run on every deploy from inside Railway's network,
# where postgres.railway.internal resolves. This sidesteps corp firewall blocks on
# the public TCP proxy port (see docs/LESSONS_LEARNED.md "CBRE corp network").
# Seed is idempotent (ON CONFLICT DO NOTHING) — inbound-tracker 0fdcb2f lesson.
startCommand = "npm run db:migrate && npm run seed:users && npm start"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"

# ---------------- Cron jobs ----------------
# Phase 2 async-walker model: each cron creates a box_sync_jobs row with triggered_by='cron'
# and awaits walker completion. The cron's exit code reflects success/failure so Railway's
# cron logs surface real errors instead of silent ones.
#
# RE-ENABLED 2026-06-01 (commit P2.15.6) after all gates from P2.15.5 were met:
#   1. ✓ Manual full walk completed (walkId 46058047-f6f1-4b1c-87ab-6f8f1e115725,
#        jobId b269b3a0-7e03-4e87-8819-38196e7ca9ed, 27,352 items in 31 min 11 sec)
#   2. ✓ Clean boot post-walk: "[boot] No orphaned sync jobs to recover."
#   3. ✓ No box.token_invalid activity_feed entries during the walk
#   4. ✓ Deep folder search returns 6-deep Procopio files (94 matches)

# Daily incremental Box sync — 4 AM Pacific (12:00 UTC).
# Walks the tree using modified_at filtering against the last completed full walk's
# started_at, so most subtrees are skipped. Catches additions + modifications, NOT deletions.
[[deploy.cronJobs]]
schedule = "0 12 * * *"
command = "npm run sync:box:incremental"

# Weekly full Box sync — 5 AM Pacific Sunday (13:00 UTC).
# Walks the entire tree, catching deletions that incremental sync misses.
# Takes ~31 min on the current 27k-item Tenants - ChapmanHoeck tree (per 2026-06-01 baseline).
[[deploy.cronJobs]]
schedule = "0 13 * * 0"
command = "npm run sync:box:full"

# ---------------- Phase 3 (P3.4) — RealNex mirror sync cron ----------------
# Nightly RealNex -> Postgres mirror sync — 3 AM Pacific (11:00 UTC), an hour before the 4 AM
# Box incremental so the two in-process workers don't overlap. Creates a realnex_sync_jobs row
# (triggered_by='cron') and AWAITS completion; the ~1,300-call run takes <1 min at concurrency
# 5 (rate_limit_hits=0 confirmed across multiple runs).
#
# ENABLED 2026-07-07 after the manual first sync + idempotency were verified: companies=1,276 /
# contacts=1,870 / groups=28 / contacts_linked=1,769 stable across two runs, zero duplicates.
#
# DRIFT CAVEAT: linking is SET-ONLY (see lib/external/realnex/sync.ts linkContacts + MEMORY.md)
# — it won't re-point/clear links for contacts re-associated or un-associated in RealNex, so
# links can slowly drift. Remedy: the "Rebuild links" button / POST /api/realnex/sync?rebuildLinks=true.
[[deploy.cronJobs]]
schedule = "0 11 * * *"
command = "npm run sync:realnex"

# Weekly Postgres backup → Box, 5 AM Pacific Saturday (13:00 UTC).
# COMMENTED OUT — P2.9 deferred (pg_dump streaming to Box backup folder).
# Don't fire crons into the void.
# [[deploy.cronJobs]]
# schedule = "0 13 * * 6"
# command = "npm run backup:weekly"

# ---------------- Phase 2.5a — PDF text-extraction cron ----------------
# Daily PDF text-extraction sweep — 6 AM Pacific (14:00 UTC), AFTER the daily
# incremental walk has had time to add any new PDFs to box_folder_index.
#
# COMMENTED OUT until one manual end-to-end run via the "Extract PDF text"
# button on /files completes successfully AND deep PDF content search returns
# correct results on production. Re-enable as separate commit P2.5a.7b.
#
# Why a cron at all when we have the manual button?
#   - Catches newly-indexed PDFs continuously (new leases drop in throughout
#     the week; nobody should have to click a button to make them searchable).
#   - Per-run cap of 10,000 PDFs means a giant initial backfill auto-spreads
#     across several runs rather than holding the worker for hours.
#
# [[deploy.cronJobs]]
# schedule = "0 14 * * *"
# command = "npm run sync:box:extract-text"
