# ── Per-service Railway config: cron-realnex ────────────────────────────────
# WHY THIS FILE EXISTS: Railway applies config-as-code OVER dashboard settings
# ("Configuration defined in code will always override values from the dashboard").
# The ROOT railway.toml defines the WEB startCommand (db:migrate && seed && next start),
# which otherwise forces this cron service to boot a Next.js web server instead of
# running the sync (confirmed 2026-07-08: cron-realnex ran `next start`, no sync fired).
# A per-service config file — pointed at via the service's Settings -> Config as Code
# path — gives cron-realnex the correct start command + cron schedule, in code.
#
# SETUP: dashboard -> cron-realnex -> Settings -> Config as Code -> path = railway.cron-realnex.toml
# See docs/RAILWAY_CRON_SETUP.md + docs/LESSONS_LEARNED.md "Railway cron".

[build]
builder = "nixpacks"

[deploy]
# One-shot: run the read-only RealNex mirror sync, then exit. scripts/sync-cron.ts awaits
# the job to completion then process.exit()s, so Railway records success/failure per run.
startCommand = "npm run sync:realnex"
# 3 AM Pacific / 11:00 UTC daily. A single cronSchedule string is the ONLY cron form Railway
# honors — the [[deploy.cronJobs]] array form is silently ignored (see LESSONS_LEARNED).
cronSchedule = "0 11 * * *"
# It's a cron one-shot, not a server: don't restart the process after the sync exits, and
# no healthcheck (this file intentionally omits healthcheckPath).
restartPolicyType = "never"
