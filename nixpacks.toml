# Ensure Python (Phase 4 master_excel scripts) + Postgres client (pg_dump for Phase 2 backups)
# are present in Railway's build image so the cron jobs can actually run when we enable them.

[phases.setup]
nixPkgs = ['nodejs_20', 'python311', 'python311Packages.pip', 'postgresql_16']

[phases.install]
cmds = ['npm ci', 'pip install -r requirements.txt']
