# Ensure Python (Phase 4 master_excel scripts) + Postgres client (pg_dump for Phase 2 backups)
# are present in Railway's build image.
#
# openpyxl is installed via Nix's `python311.withPackages` WRAPPER (not bare
# `python311Packages.openpyxl`). Reason: in Nix, individual package derivations like
# `python311Packages.openpyxl` get added to the build closure but are NOT linked into
# the standalone `python` binary's sys.path. So `python -c "import openpyxl"` from the
# command line fails with ModuleNotFoundError even though the package is "installed."
# The `withPackages` wrapper creates a python-with-libraries binary where the listed
# packages ARE on sys.path. Documented in:
#   https://nixos.wiki/wiki/Python  (Python in Nixpkgs)
#   https://nixos.org/manual/nixpkgs/stable/#python  (python.withPackages)
#
# requirements.txt is kept for local dev convenience (users who prefer pip in a venv)
# but is NOT consumed by the Railway build.

[phases.setup]
nixPkgs = [
  'nodejs_20',
  # openpyxl  → Phase 4 Master Excel reader (scripts/python/master_excel_read.py)
  # pdfplumber → Phase 2.5a PDF text extractor (scripts/python/pdf_extract_text.py)
  '(python311.withPackages (ps: with ps; [ openpyxl pdfplumber ]))',
  'postgresql_16',
]

[phases.install]
cmds = ['npm ci']
